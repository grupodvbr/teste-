<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Cupons</title>

<style>
body{
  font-family: Inter, sans-serif;
  margin:0;
  background:#0f172a;
  color:#fff;
}

.header{
  padding:20px;
  font-size:22px;
  font-weight:700;
  background:#020617;
  border-bottom:1px solid #1e293b;
}

.filtros{
  padding:20px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.filtros input,
.filtros select,
.filtros button{
  padding:10px;
  border-radius:8px;
  border:none;
}

.filtros button{
  background:#22c55e;
  color:#fff;
  font-weight:600;
  cursor:pointer;
}

.cards{
  display:flex;
  gap:20px;
  padding:20px;
}

.card{
  flex:1;
  background:#020617;
  padding:20px;
  border-radius:12px;
  border:1px solid #1e293b;
}

.card h3{
  margin:0;
  font-size:14px;
  color:#94a3b8;
}

.card p{
  font-size:22px;
  margin-top:10px;
  font-weight:700;
}

.table{
  padding:20px;
}

table{
  width:100%;
  border-collapse:collapse;
}

th, td{
  padding:12px;
  text-align:left;
  border-bottom:1px solid #1e293b;
}

th{
  color:#94a3b8;
  font-size:12px;
}

tr:hover{
  background:#020617;
}
</style>
</head>

<body>

<div class="header">📊 Painel de Cupons</div>

<!-- FILTROS -->
<div class="filtros">

  <input type="date" id="dataInicio">
  <input type="date" id="dataFim">

  <select id="empresaFiltro">
    <option value="">Todas Empresas</option>
  </select>

  <button onclick="filtrar()">Filtrar</button>

</div>

<!-- CARDS -->
<div class="cards">
  <div class="card">
    <h3>Total de Vendas</h3>
    <p id="total">R$ 0</p>
  </div>
  <div class="card">
    <h3>Quantidade</h3>
    <p id="qtd">0</p>
  </div>
  <div class="card">
    <h3>Ticket Médio</h3>
    <p id="ticket">R$ 0</p>
  </div>
</div>

<!-- TABELA -->
<div class="table">
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Empresa</th>
        <th>Valor</th>
        <th>Data</th>
        <th>Hora</th>
        <th>Caixa</th>
      </tr>
    </thead>
    <tbody id="tabela"></tbody>
  </table>
</div>

<script>

const API = "https://mighty-hat-clubs-tend.trycloudflare.com/cupons"

let dados = []

// 🔥 CARREGA DADOS
async function carregar(){
  const res = await fetch(API)
  dados = await res.json()

  preencherEmpresas()
  render(dados)
}

// 🔥 PREENCHE SELECT DE EMPRESAS
function preencherEmpresas(){
  const select = document.getElementById("empresaFiltro")

  const empresas = [...new Set(dados.map(d => d.empresa))]

  empresas.forEach(emp => {
    const opt = document.createElement("option")
    opt.value = emp
    opt.innerText = emp
    select.appendChild(opt)
  })
}

// 🔥 FILTRO
function filtrar(){

  const inicio = document.getElementById("dataInicio").value
  const fim = document.getElementById("dataFim").value
  const empresa = document.getElementById("empresaFiltro").value

  let filtrado = dados.filter(item => {

    let ok = true

    if(inicio && item.data < inicio) ok = false
    if(fim && item.data > fim) ok = false
    if(empresa && item.empresa !== empresa) ok = false

    return ok
  })

  render(filtrado)
}

// 🔥 RENDERIZA
function render(lista){

  let total = 0
  let qtd = 0

  const tbody = document.getElementById("tabela")
  tbody.innerHTML = ""

  lista.forEach(item => {

    if(item.cancelado == 0){
      total += Number(item.valor)
      qtd++
    }

    const horaFormatada =
      item.hora.substring(0,2) + ":" + item.hora.substring(2,4)

    const tr = document.createElement("tr")

    tr.innerHTML = `
      <td>${item.id}</td>
      <td>${item.empresa}</td>
      <td>R$ ${Number(item.valor).toFixed(2)}</td>
      <td>${item.data}</td>
      <td>${horaFormatada}</td>
      <td>${item.numero_caixa}</td>
    `

    tbody.appendChild(tr)
  })

  const ticket = qtd ? total / qtd : 0

  document.getElementById("total").innerText =
    "R$ " + total.toFixed(2)

  document.getElementById("qtd").innerText = qtd

  document.getElementById("ticket").innerText =
    "R$ " + ticket.toFixed(2)
}

// 🚀 INICIA
carregar()

</script>

</body>
</html>
