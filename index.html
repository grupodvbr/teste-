<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Cupons</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
body{
  font-family: Inter, sans-serif;
  margin:0;
  background:#0b1220;
  color:#fff;
}

.header{
  padding:20px;
  font-size:22px;
  font-weight:800;
  background:linear-gradient(90deg,#020617,#020617,#0f172a);
  border-bottom:1px solid #1e293b;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.status{
  font-size:12px;
  color:#22c55e;
}

.filtros{
  padding:20px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.filtros input,
.filtros select{
  padding:10px;
  border-radius:10px;
  border:1px solid #1e293b;
  background:#020617;
  color:#fff;
}

.filtros button{
  padding:10px 20px;
  background:#22c55e;
  border:none;
  border-radius:10px;
  color:#fff;
  font-weight:600;
  cursor:pointer;
}

.cards{
  display:flex;
  gap:20px;
  padding:20px;
}

.card{
  flex:1;
  background:linear-gradient(145deg,#020617,#020617,#020617);
  padding:20px;
  border-radius:16px;
  border:1px solid #1e293b;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.card h3{
  margin:0;
  font-size:13px;
  color:#94a3b8;
}

.card p{
  font-size:26px;
  margin-top:10px;
  font-weight:800;
}

.table{
  padding:20px;
}

table{
  width:100%;
  border-collapse:collapse;
}

th, td{
  padding:12px;
  text-align:left;
  border-bottom:1px solid #1e293b;
}

th{
  color:#94a3b8;
  font-size:12px;
}

tr:hover{
  background:#020617;
}
</style>
</head>

<body>

<div class="header">
  📊 Painel de Cupons
  <div class="status" id="status">Atualizando...</div>
</div>

<!-- FILTROS -->
<div class="filtros">
  <input type="date" id="dataInicio">
  <input type="date" id="dataFim">

  <select id="empresaFiltro">
    <option value="">Todas Empresas</option>
  </select>

  <button onclick="filtrar()">Filtrar</button>
</div>

<!-- CARDS -->
<div class="cards">
  <div class="card">
    <h3>Total de Vendas</h3>
    <p id="total">R$ 0</p>
  </div>
  <div class="card">
    <h3>Quantidade</h3>
    <p id="qtd">0</p>
  </div>
  <div class="card">
    <h3>Ticket Médio</h3>
    <p id="ticket">R$ 0</p>
  </div>
</div>

<!-- TABELA -->
<div class="table">
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Empresa</th>
        <th>Valor</th>
        <th>Data</th>
        <th>Hora</th>
        <th>Caixa</th>
      </tr>
    </thead>
    <tbody id="tabela"></tbody>
  </table>
</div>

<script>

const API = "https://mighty-hat-clubs-tend.trycloudflare.com/cupons"

let dados = []
let filtroAtivo = null

// 🔥 CARREGAR DADOS
async function carregar(){

  try{
    const res = await fetch(API)
    dados = await res.json()

    atualizarStatus("Atualizado agora")

    preencherEmpresas()

    if(filtroAtivo){
      aplicarFiltroSalvo()
    }else{
      render(dados)
    }

  }catch(e){
    atualizarStatus("Erro ao atualizar")
  }
}

// 🔥 STATUS VISUAL
function atualizarStatus(txt){
  const el = document.getElementById("status")
  el.innerText = txt

  setTimeout(()=>{
    el.innerText = "Atualizando em tempo real..."
  },2000)
}

// 🔥 EMPRESAS
function preencherEmpresas(){

  const select = document.getElementById("empresaFiltro")

  if(select.options.length > 1) return

  const empresas = [...new Set(dados.map(d => d.empresa))]

  empresas.forEach(emp=>{
    const opt = document.createElement("option")
    opt.value = emp
    opt.innerText = emp
    select.appendChild(opt)
  })
}

// 🔥 FILTRO
function filtrar(){

  const inicio = document.getElementById("dataInicio").value
  const fim = document.getElementById("dataFim").value
  const empresa = document.getElementById("empresaFiltro").value

  filtroAtivo = {inicio,fim,empresa}

  aplicarFiltroSalvo()
}

function aplicarFiltroSalvo(){

  const {inicio,fim,empresa} = filtroAtivo

  const filtrado = dados.filter(item=>{
    let ok = true

    if(inicio && item.data < inicio) ok = false
    if(fim && item.data > fim) ok = false
    if(empresa && item.empresa !== empresa) ok = false

    return ok
  })

  render(filtrado)
}

// 🔥 RENDER
function render(lista){

  let total = 0
  let qtd = 0

  const tbody = document.getElementById("tabela")
  tbody.innerHTML = ""

  lista.forEach(item=>{

    if(item.cancelado == 0){
      total += Number(item.valor)
      qtd++
    }

    const hora =
      item.hora.substring(0,2) + ":" +
      item.hora.substring(2,4)

    const tr = document.createElement("tr")

    tr.innerHTML = `
      <td>${item.id}</td>
      <td>${item.empresa}</td>
      <td>R$ ${Number(item.valor).toFixed(2)}</td>
      <td>${item.data}</td>
      <td>${hora}</td>
      <td>${item.numero_caixa}</td>
    `

    tbody.appendChild(tr)
  })

  const ticket = qtd ? total / qtd : 0

  document.getElementById("total").innerText =
    "R$ " + total.toFixed(2)

  document.getElementById("qtd").innerText = qtd

  document.getElementById("ticket").innerText =
    "R$ " + ticket.toFixed(2)
}

// 🚀 INICIA
carregar()

// 🔁 AUTO UPDATE A CADA 5s
setInterval(()=>{
  carregar()
},5000)

</script>

</body>
</html>
