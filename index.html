<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Cupons</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
body{
  font-family: Inter, sans-serif;
  margin:0;
  background:#0b1220;
  color:#fff;
}

.header{
  padding:20px;
  font-size:22px;
  font-weight:800;
  background:#020617;
  border-bottom:1px solid #1e293b;
  display:flex;
  justify-content:space-between;
}

.status{
  font-size:12px;
  color:#22c55e;
}

.filtros{
  padding:20px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.filtros input,
.filtros select{
  padding:10px;
  border-radius:10px;
  border:1px solid #1e293b;
  background:#020617;
  color:#fff;
}

.filtros button{
  padding:10px 20px;
  background:#22c55e;
  border:none;
  border-radius:10px;
  color:#fff;
  font-weight:600;
  cursor:pointer;
}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
  gap:20px;
  padding:20px;
}

.card{
  background:#020617;
  padding:20px;
  border-radius:16px;
  border:1px solid #1e293b;
}

.card h3{
  margin:0;
  font-size:13px;
  color:#94a3b8;
}

.valor{
  font-size:24px;
  font-weight:800;
  margin-top:8px;
}

.hoje{
  font-size:13px;
  color:#22c55e;
  margin-top:4px;
}

.table{
  padding:20px;
}

table{
  width:100%;
  border-collapse:collapse;
}

th, td{
  padding:12px;
  text-align:left;
  border-bottom:1px solid #1e293b;
}

th{
  color:#94a3b8;
  font-size:12px;
}

tr:hover{
  background:#020617;
}
</style>
</head>

<body>

<div class="header">
ANALISA SE SISTEMA OTTO
  <div class="status" id="status">Atualizando...</div>
</div>

<div class="filtros">
  <input type="date" id="dataInicio">
  <input type="date" id="dataFim">

  <select id="empresaFiltro">
    <option value="">Todas Empresas</option>
  </select>

  <button onclick="filtrar()">Filtrar</button>
</div>

<div class="cards" id="cards"></div>

<div class="table">
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Empresa</th>
        <th>Valor</th>
        <th>Data</th>
        <th>Hora</th>
        <th>Caixa</th>
      </tr>
    </thead>
    <tbody id="tabela"></tbody>
  </table>
</div>

<script>

const API = "https://revision-peripherals-glad-martha.trycloudflare.com//cupons"

let dados = []
let filtroAtivo = null

// 🔥 CONTROLE DE INCREMENTO
let ultimosIds = new Set()
let incrementoEmpresa = {}

// 🔥 ORDEM FIXA
const ORDEM_EMPRESAS = [
  "VAREJO_URL_VILLA",
  "VAREJO_URL_PADARIA",
  "VAREJO_URL_DELICIA",
  "VAREJO_URL_MERCATTO"
]

// 🔥 DATA HOJE
function hoje(){
  return new Date().toISOString().slice(0,10)
}

// 🔥 FORMATO
function formatar(v){
  return v.toLocaleString("pt-BR",{minimumFractionDigits:2})
}

// 🔥 CARREGAR
async function carregar(){
  try{
    const res = await fetch(API)

    
const novosDados = await res.json()

// 🔥 CORREÇÃO
const lista = novosDados.vendas || []

detectarIncremento(lista)

dados = lista
    
    preencherEmpresas()

    if(filtroAtivo){
      aplicarFiltroSalvo()
    }else{
      render(dados)
    }

  }catch{
    atualizarStatus("Erro")
  }
}

// 🔥 DETECTAR NOVAS VENDAS
function detectarIncremento(novos){

  let novosIds = new Set()
  incrementoEmpresa = {}

  novos.forEach(item=>{
    novosIds.add(item.id)

    if(!ultimosIds.has(item.id) && !item.cancelada){

      if(!incrementoEmpresa[item.empresa]){
        incrementoEmpresa[item.empresa] = 0
      }

      incrementoEmpresa[item.empresa] += 1
    }
  })

  ultimosIds = novosIds
}

// 🔥 STATUS
function atualizarStatus(txt){
  const el = document.getElementById("status")
  el.innerText = txt

  setTimeout(()=>{
    el.innerText = "Tempo real ativo"
  },2000)
}

// 🔥 EMPRESAS
function preencherEmpresas(){
  const select = document.getElementById("empresaFiltro")

  if(select.options.length > 1) return

  const empresas = [...new Set(dados.map(d=>d.empresa))]

  empresas.forEach(emp=>{
    const opt = document.createElement("option")
    opt.value = emp
    opt.innerText = emp
    select.appendChild(opt)
  })
}

// 🔥 FILTRO
function filtrar(){
  const inicio = document.getElementById("dataInicio").value
  const fim = document.getElementById("dataFim").value
  const empresa = document.getElementById("empresaFiltro").value

  filtroAtivo = {inicio,fim,empresa}
  aplicarFiltroSalvo()
}

function aplicarFiltroSalvo(){

  const {inicio,fim,empresa} = filtroAtivo

  const filtrado = dados.filter(item=>{
    let ok = true

    if(inicio && item.data < inicio) ok = false
    if(fim && item.data > fim) ok = false
    if(empresa && item.empresa !== empresa) ok = false

    return ok
  })

  render(filtrado)
}

// 🔥 RENDER
function render(lista){

  const tbody = document.getElementById("tabela")
  const cards = document.getElementById("cards")

  tbody.innerHTML = ""
  cards.innerHTML = ""

  let totalGeral = 0
  let totalHojeGeral = 0

  const porEmpresa = {}
  const hojeEmpresa = {}

  lista.forEach(item=>{

    if(!item.cancelada){

      totalGeral += Number(item.valor)

      if(item.data === hoje()){
        totalHojeGeral += Number(item.valor)
      }

      // TOTAL PERIODO
      if(!porEmpresa[item.empresa]) porEmpresa[item.empresa] = 0
      porEmpresa[item.empresa] += Number(item.valor)

      // TOTAL HOJE
      if(item.data === hoje()){
        if(!hojeEmpresa[item.empresa]) hojeEmpresa[item.empresa] = 0
        hojeEmpresa[item.empresa] += Number(item.valor)
      }
    }

const hora = item.hora

    const tr = document.createElement("tr")

    tr.innerHTML = `
      <td>${item.id}</td>
      <td>${item.empresa}</td>
      <td>R$ ${formatar(Number(item.valor))}</td>
      <td>${item.data}</td>
      <td>${hora}</td>
      <td>${item.numeroCaixa}</td>
    `

    tbody.appendChild(tr)
  })

  // 🔥 TOTAL GERAL
  cards.innerHTML += `
    <div class="card">
      <h3>Total Geral</h3>
      <div class="valor">R$ ${formatar(totalGeral)}</div>
      <div class="hoje">Hoje: R$ ${formatar(totalHojeGeral)}</div>
    </div>
  `

  // 🔥 EMPRESAS NA ORDEM FIXA
  ORDEM_EMPRESAS.forEach(emp=>{

    if(!porEmpresa[emp]) return

    const incremento = incrementoEmpresa[emp] || 0

    cards.innerHTML += `
      <div class="card">
        <h3>${emp}</h3>
        <div class="valor">R$ ${formatar(porEmpresa[emp])}</div>
        <div class="hoje">
          Hoje: R$ ${formatar(hojeEmpresa[emp] || 0)}
          ${incremento > 0 ? ` • + ${incremento} vendas` : ``}
        </div>
      </div>
    `
  })
}

// 🚀 INICIO
carregar()

// 🔁 TEMPO REAL
setInterval(()=>{
  carregar()
},5000)

</script>

</body>
</html>
